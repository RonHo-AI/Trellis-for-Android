# Android Trellis Template Configuration
# Settings for the AI-driven AOSP customization workflow.

#-------------------------------------------------------------------------------
# Session Recording
#-------------------------------------------------------------------------------

session_commit_message: "chore: record journal"
max_journal_lines: 2000

#-------------------------------------------------------------------------------
# Android Packages (AOSP source tree)
#-------------------------------------------------------------------------------

# Declares the main Android packages this project customizes.
# Adjust paths to match your AOSP source tree layout.
packages:
  systemui:
    path: packages/SystemUI
  launcher:
    path: packages/apps/Launcher3
  framework:
    path: frameworks/base
  overlay:
    path: vendor/custom/overlay
default_package: systemui

#-------------------------------------------------------------------------------
# Android Build Configuration
#-------------------------------------------------------------------------------

android:
  aosp_root: "${AOSP_ROOT}"
  device_target: "${DEVICE_TARGET:-aosp_cf_x86_64_phone-userdebug}"
  build_command: "m SystemUI"

#-------------------------------------------------------------------------------
# Multi-Model Routing
#-------------------------------------------------------------------------------

# Routes each pipeline phase to the optimal model.
# Change "implementation" to "codex" when codeagent-wrapper is available.
model_routing:
  design_analysis: opus
  planning: opus
  implementation: opus
  apply_diff: sonnet
  verification: sonnet
  debugging: opus
  research: sonnet
  documentation: haiku

#-------------------------------------------------------------------------------
# Codex Integration (optional — requires codeagent-wrapper)
#-------------------------------------------------------------------------------

codex:
  wrapper: "~/.claude/bin/codeagent-wrapper"
  role_prompt: ".claude/prompts/codex/android-implementer.md"
  timeout: 3600000
  session_reuse: true

#-------------------------------------------------------------------------------
# Task Lifecycle Hooks
#-------------------------------------------------------------------------------

hooks:
  after_create: []
  after_start: []
  after_archive: []
